name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days (Monday and Saturday at 8:00 AM UTC)
    - cron: '0 8 * * 1,6'
  workflow_dispatch: # Allows you to manually trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/poems?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          if [ "$response" = "200" ]; then
            echo "✅ Supabase is alive! (HTTP $response)"
          else
            echo "❌ Ping failed (HTTP $response)"
            exit 1
          fi
